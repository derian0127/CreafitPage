name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  creafit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Creafit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: Creafit/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec tsc -b --noEmit
      - run: pnpm test
